// Version direkt aus dem Cache Storage lesen ÔÇö kein SW-Kommunikation n├Âtig
async function getSwVersion() {
  if (!('caches' in window)) return '?';
  try {

const C = {

// ÔòÉÔòÉÔòÉ HELPERS ÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉ

const calc = s => {
  const u = UPPER.reduce((x,c)=>x+(s[c.id]??0),0);
  const b = u>=73?45:0;
  const l = LOWER.reduce((x,c)=>x+(s[c.id]??0),0);
  return {u,b,uTotal:u+b,l,total:u+b+l};
};
const isDone = g => g.players.every(p=>ALL_IDS.every(id=>p.scores[id]!==undefined));
const ls     = (k,d) => { try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;} };
const lsSet  = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v));}catch{} };
const lsDel  = k     => { try{localStorage.removeItem(k);}catch{} };
const pColor = (name,roster,light=false) => { const i=roster.indexOf(name); return (light?PCL:PC)[i%5]; };
const colW   = n => n<=2?80:n<=3?72:n<=4?65:n<=5?60:n<=6?55:n<=7?52:48;
const avg    = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;

// ÔòÉÔòÉÔòÉ GITHUB ÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉ

const ghHeaders = t => ({ Authorization:`token ${t}`, Accept:'application/vnd.github.v3+json' });
async function ghRead(cfg) {
  const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/gamedata.json`,
    {headers:ghHeaders(cfg.token)});
  if (r.status===404) return {data:null,sha:null};
  if (!r.ok) throw new Error(`GitHub ${r.status}`);
  const j = await r.json();
  return {data:JSON.parse(atob(j.content.replace(/\n/g,''))), sha:j.sha};
}
async function ghWrite(cfg,data,sha) {
  const body={message:'Kniffel update',content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))))};
  if (sha) body.sha=sha;
  const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/gamedata.json`,
    {method:'PUT',headers:{...ghHeaders(cfg.token),'Content-Type':'application/json'},body:JSON.stringify(body)});
  if (!r.ok) throw new Error(`GitHub ${r.status}`);
  return (await r.json()).content.sha;
}
function mergeData(local, remote) {
  const games = [...(remote.games||[])];
  const ids = new Set(games.map(g=>g.id));
  for (const g of (local.games||[])) if (!ids.has(g.id)) { games.push(g); ids.add(g.id); }
  const roster = [...new Set([...(remote.roster||[]),...(local.roster||[])])];
  return { games: games.sort((a,b)=>a.id.localeCompare(b.id)), roster };
}

// ÔòÉÔòÉÔòÉ APP ÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉ

function App() {
  const [screen,  setScreen]  = useState('home');
  const [games,   setGames]   = useState(()=>ls('kx:games',[]));
  const [cur,     setCur]     = useState(()=>ls('kx:current',null));
  const [roster,  setRoster]  = useState(()=>ls('kx:roster',[]));
  const [modal,   setModal]   = useState(null);
  const [mVal,    setMVal]    = useState('');
  const [stab,    setStab]    = useState('leaderboard');
  const [sPlayer, setSPlayer] = useState(null);
  const [sCmp,    setSCmp]    = useState([null,null]);
  const [ghCfg,   setGhCfg]   = useState(()=>ls('kx:gh',null));
  const [syncSt,  setSyncSt]  = useState('idle');
  const [syncMsg, setSyncMsg] = useState('');
  const [appVersion, setAppVersion] = useState('?');

  useEffect(()=>{
    if (roster.length===0) setScreen('gameSetup');
    else if (ghCfg?.token) doSync();
    getSwVersion().then(setAppVersion);
  },[]);

  const doSync = async cfg => {
    const c=cfg||ghCfg; if (!c?.token) return;
    setSyncSt('syncing');
    try {
      const {data,sha}=await ghRead(c);
      if (data) {
        const merged=mergeData({games:ls('kx:games',[]),roster:ls('kx:roster',[])},data);
        setGames(merged.games);    lsSet('kx:games',merged.games);
        setRoster(merged.roster);  lsSet('kx:roster',merged.roster);
        lsSet('kx:gh_sha',sha);
      }
      setSyncSt('ok'); setSyncMsg(new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}));
    } catch(e) { setSyncSt('error'); setSyncMsg(e.message); }
  };
  const pushGh = async (g,r) => {
    const c=ghCfg; if (!c?.token) return;
    setSyncSt('syncing');
    try {
      // Always fetch current SHA first ÔÇö handles new file AND existing file correctly
      const {sha} = await ghRead(c);
      const newSha = await ghWrite(c,{version:1,roster:r,games:g},sha);
      lsSet('kx:gh_sha',newSha);
      setSyncSt('ok'); setSyncMsg(new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}));
    } catch(e) { setSyncSt('error'); setSyncMsg(e.message); }
  };

  const saveGames  = (g,r) => { setGames(g);   lsSet('kx:games',g);   pushGh(g,r||roster); };
  const deleteGame = id    => { const ng=games.filter(g=>g.id!==id); saveGames(ng,roster); };
  const saveRoster = r     => { setRoster(r);  lsSet('kx:roster',r); };
  const saveCur    = g     => { setCur(g); g?lsSet('kx:current',g):lsDel('kx:current'); };

  const startGame = selectedPlayers => {
    const newRoster = [...new Set([...roster,...selectedPlayers])];
    saveRoster(newRoster);
    saveCur({id:Date.now().toString(), date:new Date().toLocaleDateString('de-DE'),
      players:selectedPlayers.map(name=>({name,scores:{}}))});
    setScreen('game');
  };
  const finishGame = () => { const ng=[...games,cur]; saveGames(ng,roster); saveCur(null); setScreen('home'); };

  const openCell = (pIdx,cat) => {
    setModal({pIdx,cat});
    const v=cur.players[pIdx].scores[cat.id];
    setMVal(v!==undefined?String(v):'');
  };
  const enterScore = val => {
    const {pIdx,cat}=modal;
    saveCur({...cur,players:cur.players.map((p,i)=>i===pIdx?{...p,scores:{...p.scores,[cat.id]:val}}:p)});
    setModal(null);
  };
  const clearCell = () => {
    const {pIdx,cat}=modal;
    const scores={...cur.players[pIdx].scores}; delete scores[cat.id];
    saveCur({...cur,players:cur.players.map((p,i)=>i===pIdx?{...p,scores}:p)});
    setModal(null);
  };

  const syncBadge = html`<span style=${{fontSize:11,color:syncSt==='ok'?C.green:syncSt==='error'?C.red:C.muted}}>
    ${syncSt==='syncing'?'Ôå╗ SyncÔÇĞ':syncSt==='ok'?`Ôİü ${syncMsg}`:syncSt==='error'?`ÔÜá ${syncMsg}`:''}
  </span>`;

  return html`<div style=${{minHeight:'100vh',background:C.bg,color:C.text}}>
    ${screen==='home'     && html`<${Home}       ...${{games,roster,cur,syncBadge,appVersion,onNew:()=>setScreen('gameSetup'),onContinue:()=>setScreen('game'),onStats:()=>setScreen('stats'),onGh:()=>setScreen('gh')}} />`}
    ${screen==='gameSetup'&& html`<${GameSetup}  roster=${roster} onStart=${startGame} onBack=${()=>setScreen('home')} />`}
    ${screen==='game' && cur && html`
      <${Game} ...${{game:cur,roster,onCell:openCell,onFinish:finishGame,onBack:()=>setScreen('home')}} />
      ${modal && html`<${Modal} ...${{modal,roster,val:mVal,setVal:setMVal,onScore:enterScore,onCross:()=>enterScore(0),onClear:clearCell,onClose:()=>setModal(null)}} />`}
    `}
    ${screen==='stats'    && html`<${Stats}       ...${{games,roster,tab:stab,setTab:setStab,selPlayer:sPlayer,setSelPlayer:setSPlayer,cmp:sCmp,setCmp:setSCmp,onDeleteGame:deleteGame,onBack:()=>setScreen('home')}} />`}
    ${screen==='gh'       && html`<${GhSettings}  initial=${ghCfg} onSave=${cfg=>{setGhCfg(cfg);lsSet('kx:gh',cfg);if(cfg)doSync(cfg);setScreen('home');}} onBack=${()=>setScreen('home')} />`}
  </div>`;
}

      <${Btn} onClick=${onNew} bg=${C.surface2} border=${C.border}>+ Neues Spiel</${Btn}>
      <${Btn} onClick=${onStats} bg=${C.surface2} border=${C.border}>
        ­şôè Statistiken <span style=${{fontSize:12,color:C.muted,marginLeft:4}}>${games.length} Spiele</span>
      </${Btn}>
    </div>
    <div style=${{display:'flex',justifyContent:'center',gap:20,marginTop:12}}>
      <button onClick=${onGh} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:13}}>Ôİü GitHub Sync</button>
    </div>
    ${recent.length>0 && html`<div style=${{marginTop:28}}>
      <div style=${{fontSize:11,color:C.muted2,letterSpacing:2,textTransform:'uppercase',marginBottom:10,fontWeight:700}}>Letzte Spiele</div>
      ${recent.map(g=>{

              color:sc[i]===maxSc?PCL[i%5]:C.muted}}>
              ${p.name}: <strong>${sc[i]}</strong>

      })}

}

function GameSetup({roster,onStart,onBack}) {
  const [selected, setSelected] = useState([]);
  const [newName,  setNewName]  = useState('');

  const toggle = name => {
    if (selected.includes(name)) setSelected(selected.filter(n=>n!==name));
    else if (selected.length<10) setSelected([...selected,name]);
  };
  const addNew = () => {
    const n=newName.trim(); if (!n||selected.length>=10) return;
    if (!selected.includes(n)) setSelected([...selected,n]);
    setNewName('');
  };

  return html`<div style=${{maxWidth:460,margin:'0 auto',padding:'20px 16px 40px'}}>
    <div style=${{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
      ${roster.length>0&&html`<button onClick=${onBack} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20,padding:0}}>ÔÇ╣</button>`}
      <span style=${{fontSize:22,fontWeight:800}}>Neues Spiel</span>
    </div>

    ${selected.length>0 && html`<div style=${{marginBottom:20}}>
      <div style=${{fontSize:11,color:C.muted2,letterSpacing:2,textTransform:'uppercase',marginBottom:8,fontWeight:700}}>Ausgew├ñhlt (${selected.length}/10)</div>
      <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
        ${selected.map((n,i)=>html`<div key=${n} style=${{display:'flex',alignItems:'center',gap:6,
          background:C.surface2,border:`2px solid ${PC[i%5]}`,borderRadius:20,padding:'6px 12px'}}>
          <span style=${{color:PC[i%5],fontWeight:700,fontSize:12}}>${i+1}</span>
          <span style=${{fontSize:13}}>${n}</span>
          <button onClick=${()=>toggle(n)} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:14,padding:'0 0 0 4px',lineHeight:1}}>├ù</button>
        </div>`)}
      </div>
    </div>`}

    ${roster.length>0 && html`<div style=${{marginBottom:20}}>
      <div style=${{fontSize:11,color:C.muted2,letterSpacing:2,textTransform:'uppercase',marginBottom:8,fontWeight:700}}>Bekannte Spieler</div>
      <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
        ${roster.map((n,ri)=>{
          const idx=selected.indexOf(n);
          const sel=idx>=0;
          return html`<button key=${n} onClick=${()=>toggle(n)}
            style=${{background:sel?C.surface2:C.surface,border:`2px solid ${sel?PC[idx%5]:C.border}`,
              borderRadius:20,padding:'7px 14px',color:sel?PC[idx%5]:C.muted,cursor:'pointer',
              fontSize:13,fontWeight:sel?700:400,transition:'all 0.15s'}}>
            ${sel?`${idx+1}. `:''}${n}
          </button>`;
        })}
      </div>
    </div>`}

    <div style=${{marginBottom:24}}>
      <div style=${{fontSize:11,color:C.muted2,letterSpacing:2,textTransform:'uppercase',marginBottom:8,fontWeight:700}}>
        Neuen Spieler hinzuf├╝gen
      </div>
      <div style=${{display:'flex',gap:8}}>
        <input value=${newName} onChange=${e=>setNewName(e.target.value)}
          onKeyDown=${e=>e.key==='Enter'&&addNew()}
          placeholder="Name eingebenÔÇĞ"
          style=${{flex:1,background:C.surface2,border:`1px solid ${C.border}`,borderRadius:12,
            padding:'11px 14px',color:C.text,fontSize:15,outline:'none'}}/>
        <button onClick=${addNew} disabled=${!newName.trim()||selected.length>=10}
          style=${{background:PC[0],border:'none',borderRadius:12,padding:'11px 18px',
            color:'white',cursor:'pointer',fontWeight:700,fontSize:15,
            opacity:(!newName.trim()||selected.length>=10)?0.4:1}}>+</button>
      </div>
    </div>

    <${Btn} onClick=${()=>onStart(selected)} bg=${PC[0]} disabled=${selected.length<2}>
      ${selected.length<2?'Mindestens 2 Spieler w├ñhlen':`Spiel starten mit ${selected.length} Spielern`}
    </${Btn}>
  </div>`;
}

// ÔòÉÔòÉÔòÉ GAME ÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉ

function Game({game,roster,onCell,onFinish,onBack}) {
  const n   = game.players.length;
  const sc  = game.players.map(p=>calc(p.scores));
  const cw  = colW(n);
  const done= isDone(game);
  const [scoresVisible, setScoresVisible] = useState(true);
  const filled=game.players.reduce((s,p)=>s+ALL_IDS.filter(id=>p.scores[id]!==undefined).length,0);
  const pct =Math.round(filled/(ALL_IDS.length*n)*100);

  const cBg =(pi,id)=>{const v=game.players[pi].scores[id]; const t=pCol(pi)+'1a'; return v===undefined?t:v===0?'#2d0a0a':'#1a1040';};
  const cCol=(pi,id)=>{const v=game.players[pi].scores[id];return v===undefined?C.muted2:v===0?C.red:C.text;};
  const cTxt=(pi,id)=>{const v=game.players[pi].scores[id];return v===undefined?'┬À':v===0?'ÔÇö':String(v);};
  const pCol=(pi)=>pColor(game.players[pi].name,roster);
  const pColL=(pi)=>pColor(game.players[pi].name,roster,true);

  const gridCols = `120px repeat(${n}, ${cw}px)`;
  const minW     = 120 + n*cw + 10;

  return html`<div style=${{maxWidth:520,margin:'0 auto'}}>
    <!-- Header -->
    <div style=${{position:'sticky',top:0,zIndex:10,background:C.bg,borderBottom:`1px solid ${C.border}`,padding:'10px 12px'}}>
      <div style=${{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
        <button onClick=${onBack} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20,padding:0}}>ÔÇ╣</button>
        <span style=${{fontSize:12,color:C.muted,flex:1}}>${game.date}</span>
        <button onClick=${()=>setScoresVisible(!scoresVisible)}
          style=${{background:'none',border:'none',cursor:'pointer',fontSize:16,padding:'0 4px',opacity:scoresVisible?1:0.4}}>­şæü</button>
        <span style=${{fontSize:11,color:C.muted2}}>${pct}%</span>
      </div>
      <!-- Player totals - horizontal scroll -->
      <div style=${{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}}>
        ${game.players.map((p,i)=>html`<div key=${i} style=${{flexShrink:0,background:C.surface2,
          borderRadius:12,padding:'6px 12px',borderLeft:`3px solid ${pCol(i)}`,minWidth:90}}>
          <div style=${{fontSize:10,color:C.muted,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:80}}>${p.name}</div>
          <div style=${{fontSize:22,fontWeight:900,color:pColL(i)}}>${scoresVisible?sc[i].total:'??'}</div>
          <div style=${{fontSize:9,color:C.muted}}>
            ${scoresVisible?(sc[i].b?html`<span style=${{color:C.green}}>Ô£ô Bonus</span>`:html`<span>ÔêÆ${73-sc[i].u}</span>`):'ÔÇö'}
          </div>
        </div>`)}
      </div>
      <div style=${{height:3,background:C.surface2,borderRadius:2,marginTop:8}}>
        <div style=${{height:3,borderRadius:2,background:`linear-gradient(90deg,${PC[0]},${PC[1]})`,width:`${pct}%`,transition:'width 0.3s'}}/>
      </div>
    </div>

    <!-- Scorecard (horizontal scroll) -->
    <div style=${{overflowX:'auto',padding:'8px 0 32px'}}>
      <div style=${{minWidth:`${minW}px`,padding:'0 12px'}}>

        <${GSec} label="OBERER TEIL" />
        <!-- Column headers -->
        <div style=${{display:'grid',gridTemplateColumns:gridCols,gap:4,marginBottom:4}}>
          <div/>
          ${game.players.map((p,i)=>html`<div key=${i} style=${{textAlign:'center',fontSize:10,fontWeight:700,
            color:pCol(i),paddingBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${p.name}</div>`)}
        </div>

        ${UPPER.map(cat=>html`<${GRow} key=${cat.id} gridCols=${gridCols} label=${html`<span style=${{fontSize:14}}>${cat.face} ${cat.label}</span>`} sub=${`nur ${cat.label}`}>
          ${game.players.map((_,i)=>html`<${GCell} key=${i} bg=${cBg(i,cat.id)} color=${cCol(i,cat.id)} cw=${cw} onClick=${()=>onCell(i,cat)}>${cTxt(i,cat.id)}</${GCell}>`)}
        </${GRow}>`)}

        <${GTot} gridCols=${gridCols} label="Summe"           vals=${sc.map(s=>s.u)} />
        <${GTot} gridCols=${gridCols} label="Bonus (ab 73ÔåÆ+45)" vals=${sc.map(s=>s.b)}
          sub=${sc.map(s=>s.b?'Ô£ô':`-${73-s.u}`)} subC=${sc.map(s=>s.b?C.green:C.muted)} />
        <${GTot} gridCols=${gridCols} label="Oberer Teil"     vals=${sc.map(s=>s.uTotal)} hi=${true} />

        <${GSec} label="UNTERER TEIL" />
        ${LOWER.map(cat=>html`<${GRow} key=${cat.id} gridCols=${gridCols} label=${cat.label} sub=${cat.t==='fix'?`${cat.pts} Pkt`:cat.desc}>
          ${game.players.map((_,i)=>html`<${GCell} key=${i} bg=${cBg(i,cat.id)} color=${cCol(i,cat.id)} cw=${cw} onClick=${()=>onCell(i,cat)}>${cTxt(i,cat.id)}</${GCell}>`)}
        </${GRow}>`)}

        <${GTot} gridCols=${gridCols} label="Unterer Teil"    vals=${sc.map(s=>s.l)} />
        <${GTot} gridCols=${gridCols} label="Oberer Teil"     vals=${sc.map(s=>s.uTotal)} />
        <${GTot} gridCols=${gridCols} label="ENDSUMME"        vals=${sc.map(s=>s.total)} hi=${true} big=${true}
          pColors=${game.players.map((_,i)=>pColL(i))} />

        ${done && html`<div style=${{marginTop:20,background:'linear-gradient(135deg,#2d1060,#1a0a30)',
          borderRadius:20,padding:'20px',textAlign:'center',border:`1px solid ${PC[0]}`}}>
          <div style=${{fontSize:26}}>­şÄë</div>
          <div style=${{fontSize:20,fontWeight:900,marginTop:6}}>
            ${(()=>{const maxS=Math.max(...sc.map(s=>s.total));const winners=game.players.filter((_,i)=>sc[i].total===maxS);return winners.length===1?`${winners[0].name} gewinnt!`:'Unentschieden!';})()}
          </div>
          <div style=${{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center',marginTop:8}}>
            ${game.players.map((p,i)=>html`<span key=${i} style=${{color:pColL(i),fontSize:13}}>
              ${p.name}: <strong>${sc[i].total}</strong>
            </span>`)}
          </div>
          <div style=${{marginTop:16}}><${Btn} onClick=${onFinish} bg=${PC[0]}>Spiel speichern & beenden</${Btn}></div>
        </div>`}
      </div>
    </div>
  </div>`;
}

function GSec({label}) {
  return html`<div style=${{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:2,textTransform:'uppercase',
    padding:'14px 0 6px',borderTop:`1px solid ${C.border}`,marginTop:6}}>${label}</div>`;
}
function GRow({gridCols,label,sub,children}) {
  return html`<div style=${{display:'grid',gridTemplateColumns:gridCols,gap:4,marginBottom:4,alignItems:'center'}}>
    <div><div style=${{fontSize:12,fontWeight:600}}>${label}</div>${sub&&html`<div style=${{fontSize:9,color:C.muted}}>${sub}</div>`}</div>
    ${children}
  </div>`;
}
function GCell({bg,color,onClick,cw,children}) {
  return html`<div onClick=${onClick} style=${{background:bg,borderRadius:9,height:38,width:`${cw}px`,
    display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
    fontSize:13,fontWeight:700,color,border:`1px solid ${C.border}`}}>${children}</div>`;
}
function GTot({gridCols,label,vals,sub,subC,hi,big,pColors}) {
  return html`<div style=${{display:'grid',gridTemplateColumns:gridCols,gap:4,marginBottom:3,
    alignItems:'center',background:hi?C.surface2:'transparent',borderRadius:9,padding:hi?'5px 6px':'3px 6px'}}>
    <div style=${{fontSize:hi?11:10,color:hi?C.text:C.muted,fontWeight:hi?700:400}}>${label}</div>
    ${vals.map((v,i)=>html`<div key=${i} style=${{textAlign:'center',
      fontSize:big?20:hi?13:12,fontWeight:hi||big?800:500,
      color:big?(pColors?.[i]||C.text):hi?C.text:C.muted}}>
      ${v}${sub&&html`<div style=${{fontSize:9,color:subC?.[i]??C.muted,fontWeight:400}}>${sub[i]}</div>`}
    </div>`)}
  </div>`;
}

// ÔòÉÔòÉÔòÉ MODAL ÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉ

    display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:50}}>
    <div onClick=${e=>e.stopPropagation()} style=${{background:C.surface,borderRadius:'22px 22px 0 0',
      width:'100%',maxWidth:460,padding:'20px 20px 40px',borderTop:`1px solid ${C.border}`}}>
      <div style=${{width:36,height:4,background:C.border,borderRadius:2,margin:'0 auto 18px'}}/>
      <div style=${{textAlign:'center',marginBottom:18}}>

        <div style=${{fontSize:12,color:C.muted,marginTop:3}}>
          ${cat.t==='fix'?`${cat.pts} Punkte bei Erfolg`:cat.t==='super'?'alle Augen ├ù 2 ÔÇö Endpunktzahl eingeben':'alle Augen z├ñhlen'}
        </div>

      ${cat.t==='fix'
        ?html`<div style=${{display:'flex',flexDirection:'column',gap:10}}>
            <${Btn} onClick=${()=>onScore(cat.pts)} bg="#14532d">Ô£ô Erreicht ÔÇö ${cat.pts} Punkte</${Btn}>
            <${Btn} onClick=${onCross} bg="#7f1d1d">Ô£ò Streichen ÔÇö 0 Punkte</${Btn}>
          </div>`
        :html`<div style=${{display:'flex',flexDirection:'column',gap:10}}>
            <input type="number" min="0" value=${val} onChange=${e=>setVal(e.target.value)} autoFocus
              style=${{background:C.surface2,border:`2px solid ${pc}`,borderRadius:14,
                padding:'14px',color:C.text,fontSize:24,textAlign:'center',outline:'none',width:'100%'}} placeholder="Punkte"/>

        Eintrag l├Âschen</button>`}

// ÔòÉÔòÉÔòÉ STATS ÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉ

function Stats({games,roster,tab,setTab,selPlayer,setSelPlayer,cmp,setCmp,onDeleteGame,onBack}) {
  if (!games.length) return html`<div style=${{maxWidth:460,margin:'0 auto',padding:'60px 20px',textAlign:'center'}}>
    <button onClick=${onBack} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:16,display:'block',marginBottom:32}}>ÔÇ╣ Zur├╝ck</button>
    <div style=${{fontSize:40,marginBottom:12}}>­şôè</div>
    <div style=${{color:C.muted}}>Noch keine Spiele gespeichert.</div>
  </div>`;

  // Build stats per player
  const playerStats = roster.map(name=>{
    const pg=games.filter(g=>g.players.some(p=>p.name===name));
    const getP=g=>g.players.find(p=>p.name===name);
    const sc=pg.map(g=>calc(getP(g).scores));
    const tots=sc.map(s=>s.total);
    const wins=pg.filter(g=>{
      const allSc=g.players.map(p=>calc(p.scores).total);
      const mySc=calc(getP(g).scores).total;
      return mySc===Math.max(...allSc)&&allSc.filter(s=>s===mySc).length===1;
    }).length;
    const catData=[...UPPER,...LOWER].map(cat=>{
      const entries=pg.map(g=>getP(g).scores[cat.id]).filter(v=>v!==undefined);
      const ach=entries.filter(v=>v>0);
      return {id:cat.id,label:cat.label,played:entries.length,achN:ach.length,
        rate:entries.length?Math.round(ach.length/entries.length*100):0,
        avgPts:ach.length?Math.round(ach.reduce((a,b)=>a+b,0)/ach.length):0};
    });
    const avgDice=UPPER.map(cat=>{
      const vals=pg.filter(g=>getP(g).scores[cat.id]>0).map(g=>Math.round(getP(g).scores[cat.id]/cat.n));
      return {label:cat.face,name:cat.label,val:vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):0};
    });
    return {name,n:pg.length,wins,avg:avg(tots),best:tots.length?Math.max(...tots):0,
      worst:tots.length?Math.min(...tots):0,bonusRate:pg.length?Math.round(sc.filter(s=>s.b>0).length/pg.length*100):0,
      catData,avgDice,tots};
  }).filter(p=>p.n>0);

  const TABS=[{id:'leaderboard',l:'Rangliste'},{id:'player',l:'Spieler'},{id:'compare',l:'Vergleich'},{id:'dice',l:'W├╝rfel'},{id:'gesamt',l:'Gesamt'},{id:'historie',l:'Historie'}];
  const selP=selPlayer||playerStats[0]?.name;
  const selSt=playerStats.find(p=>p.name===selP);

  const Sel=({val,set,label})=>html`<div style=${{marginBottom:14}}>
    ${label&&html`<div style=${{fontSize:11,color:C.muted2,letterSpacing:1,textTransform:'uppercase',marginBottom:5,fontWeight:700}}>${label}</div>`}
    <div style=${{position:'relative'}}>
      <select value=${val||''} onChange=${e=>set(e.target.value)}
        style=${{width:'100%',background:C.surface2,border:`1px solid ${C.border}`,borderRadius:12,
          padding:'10px 36px 10px 14px',color:C.text,fontSize:14,outline:'none',cursor:'pointer'}}>
        <option value="">Spieler w├ñhlenÔÇĞ</option>
        ${playerStats.map(p=>html`<option key=${p.name} value=${p.name}>${p.name}</option>`)}
      </select>
      <span style=${{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',color:C.muted,pointerEvents:'none'}}>Ôû¥</span>
    </div>
  </div>`;

  return html`<div style=${{maxWidth:460,margin:'0 auto'}}>
    <div style=${{position:'sticky',top:0,background:C.bg,zIndex:10,padding:'12px 16px',borderBottom:`1px solid ${C.border}`}}>
      <div style=${{display:'flex',alignItems:'center',gap:12}}>
        <button onClick=${onBack} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20,padding:0}}>ÔÇ╣</button>
        <span style=${{fontWeight:800,fontSize:18,flex:1}}>Statistiken</span>
        <span style=${{fontSize:12,color:C.muted2}}>${games.length} Spiele</span>
      </div>
      <div style=${{display:'flex',marginTop:10,borderBottom:`1px solid ${C.border}`,overflowX:'auto'}}>
        ${TABS.map(t=>html`<button key=${t.id} onClick=${()=>setTab(t.id)} style=${{
          flexShrink:0,background:'none',border:'none',cursor:'pointer',padding:'8px 12px',fontSize:12,fontWeight:600,
          color:tab===t.id?PCL[0]:C.muted,borderBottom:tab===t.id?`2px solid ${PC[0]}`:'2px solid transparent'}}>${t.l}</button>`)}
      </div>
    </div>

    <div style=${{padding:16}}>

      ${tab==='leaderboard' && html`<div>
        <div style=${{fontSize:12,color:C.muted,marginBottom:14}}>Alle Spieler nach ├İ-Punktzahl sortiert.</div>
        ${[...playerStats].sort((a,b)=>b.avg-a.avg).map((p,rank)=>{
          const ci=roster.indexOf(p.name);
          return html`<div key=${p.name} style=${{background:C.surface,borderRadius:16,padding:'12px 16px',
            marginBottom:8,display:'grid',gridTemplateColumns:'28px 1fr auto',gap:12,alignItems:'center',
            borderLeft:`3px solid ${PC[ci%5]}`}}>
            <div style=${{fontSize:18,fontWeight:900,color:rank===0?'#fde68a':C.muted2}}>${rank+1}.</div>
            <div>
              <div style=${{fontWeight:700,fontSize:15,color:PCL[ci%5]}}>${p.name}</div>
              <div style=${{fontSize:11,color:C.muted,marginTop:2}}>
                ${p.n} Spiele ┬À ${p.wins} Siege ┬À Bonus ${p.bonusRate}%
              </div>
            </div>
            <div style=${{textAlign:'right'}}>
              <div style=${{fontSize:22,fontWeight:900}}>${p.avg}</div>
              <div style=${{fontSize:10,color:C.muted}}>├İ Punkte</div>
            </div>
          </div>`;
        })}
        ${games.length>1&&html`<div style=${{background:C.surface,borderRadius:16,padding:14,marginTop:16}}>
          <div style=${{fontSize:13,fontWeight:700,marginBottom:8}}>Punktverlauf aller Spieler</div>
          <div style=${{height:160}}>
            <${ResponsiveContainer} width="100%" height="100%">
              <${BarChart} data=${games.map((g,i)=>({i:i+1,...Object.fromEntries(g.players.map(p=>[p.name,calc(p.scores).total]))}))} barCategoryGap="15%">
                <${XAxis} dataKey="i" tick=${{fill:C.muted,fontSize:10}} axisLine=${false} tickLine=${false}/>
                <${YAxis} hide=${true}/>
                <${Tooltip} contentStyle=${{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10}} cursor=${{fill:'rgba(255,255,255,0.05)'}}/>
                ${playerStats.map((p,i)=>html`<${Bar} key=${p.name} dataKey=${p.name} fill=${PC[roster.indexOf(p.name)%5]} radius=${[3,3,0,0]}/>`)}
              </${BarChart}>
            </${ResponsiveContainer}>
          </div>
          <div style=${{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center',marginTop:6}}>
            ${playerStats.map(p=>html`<span key=${p.name} style=${{fontSize:11,color:C.muted}}>
              <span style=${{color:PC[roster.indexOf(p.name)%5]}}>Ôûá</span> ${p.name}
            </span>`)}
          </div>
        </div>`}
      </div>`}

      ${tab==='player' && html`<div>
        <${Sel} val=${selP} set=${setSelPlayer} label="Spieler" />
        ${selSt && html`<div>
          ${(()=>{const ci=roster.indexOf(selSt.name); return html`
            <div style=${{background:C.surface,borderRadius:16,padding:14,marginBottom:12,borderTop:`3px solid ${PC[ci%5]}`}}>
              <div style=${{fontSize:15,fontWeight:800,color:PCL[ci%5],marginBottom:10}}>${selSt.name}</div>
              <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                ${[['Spiele',selSt.n],['Siege',selSt.wins],['├İ Punkte',selSt.avg||'ÔÇö'],
                  ['Bestwert',selSt.best||'ÔÇö'],['Schlechtester',selSt.worst||'ÔÇö'],['Bonus-Rate',selSt.bonusRate+'%']
                ].map(([l,v])=>html`<div style=${{background:C.surface2,borderRadius:10,padding:'8px 10px',textAlign:'center'}}>
                  <div style=${{fontSize:10,color:C.muted,marginBottom:3}}>${l}</div>
                  <div style=${{fontSize:14,fontWeight:700}}>${v}</div>
                </div>`)}
              </div>
            </div>
            <div style=${{background:C.surface,borderRadius:16,padding:14,marginBottom:12}}>
              <div style=${{fontSize:13,fontWeight:700,marginBottom:10}}>Kategorie-Erreichungsrate</div>
              ${selSt.catData.filter(c=>c.played>0&&LOWER.some(l=>l.id===c.id)).map(c=>html`<div key=${c.id} style=${{marginBottom:8}}>
                <div style=${{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style=${{fontSize:12}}>${c.label}</span>
                  <span style=${{fontSize:12}}>
                    <strong>${c.rate}%</strong>
                    ${c.avgPts>0?html`<span style=${{color:C.muted}}> ┬À ├İ ${c.avgPts}</span>`:''}
                    <span style=${{color:C.muted2}}> (${c.achN}/${c.played})</span>
                  </span>
                </div>
                <div style=${{height:5,background:C.surface2,borderRadius:3,overflow:'hidden'}}>
                  <div style=${{height:5,borderRadius:3,background:PC[ci%5],width:`${c.rate}%`,transition:'width 0.4s'}}/>
                </div>
              </div>`)}
            </div>
          `})()}
        </div>`}
      </div>`}

      ${tab==='compare' && html`<div>
        <${Sel} val=${cmp[0]} set=${v=>setCmp([v,cmp[1]])} label="Spieler 1" />
        <${Sel} val=${cmp[1]} set=${v=>setCmp([cmp[0],v])} label="Spieler 2" />
        ${cmp[0]&&cmp[1]&&cmp[0]!==cmp[1] && (()=>{
          const p1=cmp[0],p2=cmp[1];
          const shared=games.filter(g=>g.players.some(p=>p.name===p1)&&g.players.some(p=>p.name===p2));
          if (!shared.length) return html`<div style=${{color:C.muted,textAlign:'center',padding:20}}>Keine gemeinsamen Spiele gefunden.</div>`;
          const getS=(g,name)=>calc(g.players.find(p=>p.name===name).scores).total;
          const p1wins=shared.filter(g=>getS(g,p1)>getS(g,p2)).length;
          const p2wins=shared.filter(g=>getS(g,p2)>getS(g,p1)).length;
          const ties=shared.length-p1wins-p2wins;
          const c1=PC[roster.indexOf(p1)%5],c2=PC[roster.indexOf(p2)%5];
          const cl1=PCL[roster.indexOf(p1)%5],cl2=PCL[roster.indexOf(p2)%5];
          const p1tots=shared.map(g=>getS(g,p1)), p2tots=shared.map(g=>getS(g,p2));
          const histData=shared.map((g,i)=>({i:i+1,[p1]:getS(g,p1),[p2]:getS(g,p2)}));
          return html`<div>
            <div style=${{background:C.surface,borderRadius:16,padding:16,marginBottom:12}}>
              <div style=${{fontSize:13,fontWeight:700,marginBottom:12,color:C.muted}}>Direktvergleich ┬À ${shared.length} gemeinsame Spiele</div>
              <div style=${{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:12,alignItems:'center',textAlign:'center'}}>
                <div>
                  <div style=${{fontSize:13,color:cl1,fontWeight:700,marginBottom:6}}>${p1}</div>
                  <div style=${{fontSize:36,fontWeight:900,color:p1wins>p2wins?cl1:C.muted}}>${p1wins}</div>
                  <div style=${{fontSize:10,color:C.muted}}>Siege</div>
                </div>
                <div style=${{color:C.muted2,fontSize:20,fontWeight:900}}>vs</div>
                <div>
                  <div style=${{fontSize:13,color:cl2,fontWeight:700,marginBottom:6}}>${p2}</div>
                  <div style=${{fontSize:36,fontWeight:900,color:p2wins>p1wins?cl2:C.muted}}>${p2wins}</div>
                  <div style=${{fontSize:10,color:C.muted}}>Siege</div>
                </div>
              </div>
              ${ties>0&&html`<div style=${{textAlign:'center',marginTop:8,fontSize:12,color:C.muted2}}>${ties} Unentschieden</div>`}
            </div>
            <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              ${[[p1,p1tots,cl1],[p2,p2tots,cl2]].map(([name,tots,cl])=>html`<div key=${name}
                style=${{background:C.surface,borderRadius:14,padding:12}}>
                <div style=${{fontSize:11,color:cl,fontWeight:700,marginBottom:6}}>${name}</div>
                ${[['├İ Punkte',avg(tots)],['Bestwert',Math.max(...tots)],['Schlechtester',Math.min(...tots)]].map(([l,v])=>html`
                  <div style=${{display:'flex',justifyContent:'space-between',padding:'3px 0',borderBottom:`1px solid ${C.border}`}}>
                    <span style=${{fontSize:10,color:C.muted}}>${l}</span>
                    <span style=${{fontSize:12,fontWeight:700}}>${v}</span>
                  </div>`)}
              </div>`)}
            </div>
            ${shared.length>1&&html`<div style=${{background:C.surface,borderRadius:16,padding:14}}>
              <div style=${{fontSize:13,fontWeight:700,marginBottom:8}}>Punktverlauf</div>
              <div style=${{height:150}}>
                <${ResponsiveContainer} width="100%" height="100%">
                  <${BarChart} data=${histData} barCategoryGap="20%">
                    <${XAxis} dataKey="i" tick=${{fill:C.muted,fontSize:10}} axisLine=${false} tickLine=${false}/>
                    <${YAxis} hide=${true}/>
                    <${Tooltip} contentStyle=${{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10}} cursor=${{fill:'rgba(255,255,255,0.05)'}}/>
                    <${Bar} dataKey=${p1} fill=${c1} radius=${[4,4,0,0]}/>
                    <${Bar} dataKey=${p2} fill=${c2} radius=${[4,4,0,0]}/>
                  </${BarChart}>
                </${ResponsiveContainer}>
              </div>
              <div style=${{display:'flex',gap:16,justifyContent:'center',marginTop:6,fontSize:11,color:C.muted}}>
                <span><span style=${{color:c1}}>Ôûá</span> ${p1}</span>
                <span><span style=${{color:c2}}>Ôûá</span> ${p2}</span>
              </div>
            </div>`}
          </div>`;
        })()}
      </div>`}

      ${tab==='dice' && html`<div>
        <${Sel} val=${selP} set=${setSelPlayer} label="Spieler" />
        ${selSt && html`<div>
          <div style=${{background:C.surface,borderRadius:16,padding:14}}>
            <div style=${{fontSize:13,fontWeight:700,marginBottom:4}}>├İ W├╝rfelanzahl pro Seite</div>
            <div style=${{fontSize:11,color:C.muted,marginBottom:12}}>
              Wie viele W├╝rfel einer Seite wurden im Schnitt eingetragen ÔÇö nur eingetragene (nicht gestrichene) Felder.
            </div>
            <div style=${{height:180}}>
              <${ResponsiveContainer} width="100%" height="100%">
                <${BarChart} data=${selSt.avgDice} barCategoryGap="15%">
                  <${XAxis} dataKey="label" tick=${{fill:C.muted,fontSize:18}} axisLine=${false} tickLine=${false}/>
                  <${YAxis} tick=${{fill:C.muted,fontSize:10}} axisLine=${false} tickLine=${false} width=${24}/>
                  <${Tooltip} contentStyle=${{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10}}
                    cursor=${{fill:'rgba(255,255,255,0.05)'}} formatter=${(v,n)=>[`├İ ${v}`,n]}/>
                  <${Bar} dataKey="val" name=${selSt.name} radius=${[5,5,0,0]}>
                    ${selSt.avgDice.map((_,i)=>html`<${Cell} key=${i} fill=${PC[roster.indexOf(selSt.name)%5]}/>`)}
                  </${Bar}>
                </${BarChart}>
              </${ResponsiveContainer}>
            </div>
            <div style=${{display:'flex',justifyContent:'space-around',marginTop:8}}>
              ${selSt.avgDice.map(d=>html`<div key=${d.label} style=${{textAlign:'center'}}>
                <div style=${{fontSize:16}}>${d.label}</div>
                <div style=${{fontSize:12,fontWeight:700}}>${d.val}</div>
              </div>`)}
            </div>
          </div>
        </div>`}
      </div>`}

      ${tab==='gesamt' && (()=>{
        // Aggregate category stats across ALL players and ALL games
        const allCatStats = LOWER.map(cat=>{
          const entries = games.flatMap(g=>g.players.map(p=>p.scores[cat.id]).filter(v=>v!==undefined));
          const achieved = entries.filter(v=>v>0);
          return {
            id:cat.id, label:cat.label, t:cat.t, pts:cat.pts,
            played:entries.length, achN:achieved.length,
            rate:entries.length?Math.round(achieved.length/entries.length*100):0,
            avg:achieved.length?Math.round(achieved.reduce((a,b)=>a+b,0)/achieved.length):0,
          };
        }).filter(c=>c.played>0);

        const totalEntries  = allCatStats.reduce((s,c)=>s+c.played,0);
        const totalAchieved = allCatStats.reduce((s,c)=>s+c.achN,0);
        const overallRate   = totalEntries?Math.round(totalAchieved/totalEntries*100):0;
        const totalPlayers  = [...new Set(games.flatMap(g=>g.players.map(p=>p.name)))].length;

        return html`<div>
          <!-- Summary card -->
          <div style=${{background:C.surface,borderRadius:16,padding:14,marginBottom:14,
            display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,textAlign:'center'}}>
            ${[['Spiele',games.length],['Spieler',totalPlayers],['├İ Erreichung',overallRate+'%']].map(([l,v])=>html`
              <div style=${{background:C.surface2,borderRadius:12,padding:'10px 6px'}}>
                <div style=${{fontSize:10,color:C.muted,marginBottom:4}}>${l}</div>
                <div style=${{fontSize:18,fontWeight:900,color:PCL[0]}}>${v}</div>
              </div>`)}
          </div>

          <div style=${{fontSize:12,color:C.muted,marginBottom:12}}>
            Erreichungsrate und ├İ-Punkte aller Spieler zusammen.
          </div>

          <!-- Category bars -->
          ${allCatStats.map(c=>html`<div key=${c.id} style=${{background:C.surface,borderRadius:14,padding:'11px 14px',marginBottom:8}}>
            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
              <span style=${{fontSize:13,fontWeight:700}}>${c.label}</span>
              <span style=${{fontSize:11}}>
                <strong style=${{color:c.rate>=70?C.green:c.rate>=40?PCL[3]:PCL[1]}}>${c.rate}%</strong>
                ${c.t!=='fix'&&c.avg>0?html`<span style=${{color:C.muted}}> ┬À ├İ ${c.avg} Pkt</span>`:''}
                <span style=${{color:C.muted2}}> (${c.achN}/${c.played})</span>
              </span>
            </div>
            <div style=${{height:6,background:C.surface2,borderRadius:3,overflow:'hidden'}}>
              <div style=${{height:6,borderRadius:3,transition:'width 0.4s',width:`${c.rate}%`,
                background:c.rate>=70?C.green:c.rate>=40?PC[3]:PC[1]}}/>
            </div>
          </div>`)}

          <!-- Top 3 / Bottom 3 -->
          <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:16}}>
            <div style=${{background:C.surface,borderRadius:14,padding:12}}>
              <div style=${{fontSize:12,fontWeight:700,color:C.green,marginBottom:8}}>­şÅå Top Kategorien</div>
              ${[...allCatStats].sort((a,b)=>b.rate-a.rate).slice(0,3).map((c,i)=>html`
                <div key=${c.id} style=${{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:`1px solid ${C.border}`}}>
                  <span style=${{fontSize:11,color:C.muted}}>${c.label}</span>
                  <span style=${{fontSize:11,fontWeight:700,color:C.green}}>${c.rate}%</span>
                </div>`)}
            </div>
            <div style=${{background:C.surface,borderRadius:14,padding:12}}>
              <div style=${{fontSize:12,fontWeight:700,color:PC[1],marginBottom:8}}>­şôë Schwerste</div>
              ${[...allCatStats].sort((a,b)=>a.rate-b.rate).slice(0,3).map((c,i)=>html`
                <div key=${c.id} style=${{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:`1px solid ${C.border}`}}>
                  <span style=${{fontSize:11,color:C.muted}}>${c.label}</span>
                  <span style=${{fontSize:11,fontWeight:700,color:PC[1]}}>${c.rate}%</span>
                </div>`)}
            </div>
          </div>
        </div>`;
      })()}

      ${tab==='historie' && html`<div>
        <div style=${{fontSize:12,color:C.muted,marginBottom:14}}>
          Alle gespeicherten Spiele. Tippe auf ­şùæ um ein Spiel zu l├Âschen.
        </div>
        ${[...games].reverse().map(g=>{
          const sc=g.players.map(p=>calc(p.scores).total);
          const maxSc=Math.max(...sc);
          return html`<div key=${g.id} style=${{background:C.surface,borderRadius:14,padding:'12px 14px',marginBottom:8}}>
            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
              <div>
                <span style=${{color:C.muted,fontSize:12}}>${g.date}</span>
                <span style=${{color:C.muted2,fontSize:11,marginLeft:8}}>${g.players.length} Spieler</span>
              </div>
              <button onClick=${()=>{if(confirm('Dieses Spiel wirklich l├Âschen?'))onDeleteGame(g.id);}}
                style=${{background:'none',border:'none',color:C.red,cursor:'pointer',fontSize:18,padding:'0 4px'}}>­şùæ</button>
            </div>
            <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
              ${g.players.map((p,i)=>html`<span key=${i} style=${{fontSize:13,
                color:sc[i]===maxSc?PCL[roster.indexOf(p.name)%5]:C.muted}}>
                ${p.name}: <strong>${sc[i]}</strong>
              </span>`)}
            </div>
          </div>`;
        })}
      </div>`}

    </div>
  </div>`;
}

// ÔòÉÔòÉÔòÉ GITHUB SETTINGS ÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉ

function GhSettings({initial,onSave,onBack}) {
  const [token,setToken]=useState(initial?.token||'');
  const [owner,setOwner]=useState(initial?.owner||'');
  const [repo,setRepo]  =useState(initial?.repo||'');
  const [testing,setTesting]=useState(false);
  const [res,setRes]=useState(null);
  const test=async()=>{
    setTesting(true);setRes(null);
    try{const r=await fetch(`https://api.github.com/repos/${owner}/${repo}`,{headers:{Authorization:`token ${token}`}});
      setRes(r.ok?{ok:true,msg:'Ô£ô Verbindung erfolgreich!'}:{ok:false,msg:`Fehler ${r.status}`});}
    catch{setRes({ok:false,msg:'Netzwerkfehler.'});}
    setTesting(false);
  };
  const F=({label,val,set,type='text',ph})=>html`<div style=${{marginBottom:12}}>
    <label style=${{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:1,textTransform:'uppercase',display:'block',marginBottom:5}}>${label}</label>
    <input type=${type} value=${val} onChange=${e=>set(e.target.value)} placeholder=${ph}
      style=${{width:'100%',background:C.surface2,border:`1px solid ${C.border}`,borderRadius:12,padding:'11px 14px',color:C.text,fontSize:15,outline:'none'}}/>
  </div>`;
  return html`<div style=${{maxWidth:400,margin:'0 auto',padding:'20px'}}>
    <div style=${{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
      <button onClick=${onBack} style=${{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20}}>ÔÇ╣</button>
      <span style=${{fontSize:20,fontWeight:800}}>Ôİü GitHub Sync</span>
    </div>
    <div style=${{background:C.surface,borderRadius:14,padding:14,marginBottom:16,fontSize:12,color:C.muted,lineHeight:1.7}}>
      <strong style=${{color:C.text}}>1.</strong> Privates Repo erstellen, z.B. <code style=${{color:PCL[0]}}>yahtzee-data</code><br/>
      <strong style=${{color:C.text}}>2.</strong> Token unter <em>Settings ÔåÆ Developer settings ÔåÆ Personal access tokens ÔåÆ Tokens (classic)</em> mit <code style=${{color:PCL[0]}}>repo</code>-Berechtigung<br/>
      <strong style=${{color:C.text}}>3.</strong> Unten eintragen
    </div>
    <${F} label="Personal Access Token" val=${token} set=${setToken} type="password" ph="ghp_..."/>
    <${F} label="GitHub-Nutzername"     val=${owner} set=${setOwner} ph="sowyyn"/>
    <${F} label="Repository-Name"       val=${repo}  set=${setRepo}  ph="yahtzee-data"/>
    <div style=${{display:'flex',gap:10,marginTop:8}}>
      <button onClick=${test} disabled=${testing||!token||!owner||!repo}
        style=${{flex:1,background:C.surface2,border:`1px solid ${C.border}`,borderRadius:12,padding:'11px',
          color:C.text,cursor:'pointer',fontSize:14,fontWeight:600,opacity:(!token||!owner||!repo)?0.4:1}}>
        ${testing?'ÔÇĞ':'Testen'}
      </button>
      <button onClick=${()=>onSave({token,owner,repo})} disabled=${!token||!owner||!repo}
        style=${{flex:2,background:PC[0],border:'none',borderRadius:12,padding:'11px',color:'white',
          cursor:'pointer',fontSize:14,fontWeight:700,opacity:(!token||!owner||!repo)?0.4:1}}>
        Aktivieren
      </button>
    </div>
    ${res&&html`<div style=${{marginTop:12,padding:'10px 14px',borderRadius:10,
      background:res.ok?'#052e16':'#2d0a0a',color:res.ok?C.green:C.red,fontSize:13}}>${res.msg}</div>`}
    ${initial?.token&&html`<button onClick=${()=>onSave(null)} style=${{background:'none',border:'none',
      color:C.muted,cursor:'pointer',fontSize:12,marginTop:14,display:'block',width:'100%',textAlign:'center'}}>
      Sync deaktivieren</button>`}
  </div>`;
}

// ÔòÉÔòÉÔòÉ SHARED ÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉ

function Btn({onClick,bg,border,children,disabled}) {
  return html`<button onClick=${onClick} disabled=${disabled} style=${{
    width:'100%',padding:'13px 16px',borderRadius:14,border:border?`1px solid ${border}`:'none',
    background:disabled?C.muted2:bg,color:'white',fontSize:15,fontWeight:700,
    cursor:disabled?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,
    opacity:disabled?0.5:1}}>${children}</button>`;
}

// ÔòÉÔòÉÔòÉ BOOT ÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉ

if ('serviceWorker' in navigator) {
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
